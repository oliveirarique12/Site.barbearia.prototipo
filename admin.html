<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Mario Barba</title>
<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  padding: 20px;
}
h1 { text-align: center; }
.card {
  background: #222;
  padding: 15px;
  border-radius: 10px;
  margin: 10px 0;
}
button {
  background: red;
  color: #fff;
  border: none;
  padding: 8px;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>📅 Painel - Seus agendamentos 📅</h1>
<div id="loginDiv">
  <p>Login necessário</p>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">
  <button id="btnLogin">Entrar</button>
</div>

<div id="painel" style="display:none;">
  <h2>Agendamentos Ativos</h2>
  <div id="lista"></div>

  <h2>Histórico de Agendamentos</h2>
  <div id="historico"></div>

  <button id="btnSair">Sair</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs, setDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxApXN7L9FvLL2Sk-U6s-rdyB0u5zH6tI",
  authDomain: "mario-barba.firebaseapp.com",
  projectId: "mario-barba",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const loginDiv = document.getElementById("loginDiv");
const painel = document.getElementById("painel");

// Login do mario
document.getElementById("btnLogin").addEventListener("click", async ()=>{
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;
  try{
    await signInWithEmailAndPassword(auth, email, senha);
  } catch(e){
    alert("Email ou senha incorreto!");
  }
});

// Sair
document.getElementById("btnSair").addEventListener("click", async ()=>{
  await signOut(auth);
});

// Verificar login
onAuthStateChanged(auth, (user)=>{
  if(user){
    loginDiv.style.display = "none";
    painel.style.display = "block";
    carregarPainel();
  } else {
    loginDiv.style.display = "block";
    painel.style.display = "none";
  }
});

// Funçôes do painel
async function carregarPainel(){
  await arquivarAgendamentos();
  carregarAgendamentos();
  carregarHistorico();
}

// Arquivar agendamentos antigos
async function arquivarAgendamentos(){
  const hoje = new Date().toISOString().split('T')[0];
  const snapshot = await getDocs(collection(db, "agendamentos"));
  snapshot.forEach(async (docSnap)=>{
    const data = docSnap.data().data;
    const id = docSnap.id;
    if(data < hoje){
      await setDoc(doc(db, "agendamentos_concluidos", id), docSnap.data());
      await deleteDoc(doc(db, "agendamentos", id));
    }
  });
}

// Carregar agendamentos ativos
async function carregarAgendamentos(){
  const div = document.getElementById("lista");
  div.innerHTML = "";
  const querySnapshot = await getDocs(collection(db, "agendamentos"));
  console.log(querySnapshot.docs.map(doc => doc.data()));
  
  querySnapshot.forEach((d)=>{
    const data = d.data();
    const card = document.createElement("div");
    card.className="card";
   card.innerHTML = `
  <p><strong>💈 ${
    data.servicos
      ? data.servicos.map(s => s.nome).join(", ")
      : data.servico || "Serviço"
  }</strong></p>

  <p>📅 ${data.data || data.dia}</p>
  <p>⏰ ${data.hora}</p>

  <button onclick="cancelarAgendamento('${d.id}')">
    Cancelar
  </button>
`;
    div.appendChild(card);
  });
}

// Carregar histórico
async function carregarHistorico(){
  const div = document.getElementById("historico");
  div.innerHTML = "";
  const snapshot = await getDocs(collection(db, "agendamentos_concluidos"));
  snapshot.forEach((d)=>{
    const data = d.data();
    const card = document.createElement("div");
    card.className="card";
   card.innerHTML = `
  <p><strong>💈 ${
    data.servicos
      ? data.servicos.map(s => s.nome).join(", ")
      : data.servico || "Serviço"
  }</strong></p>

  <p>📅 ${data.data || data.dia}</p>
  <p>⏰ ${data.hora}</p>
`;
    div.appendChild(card);
  });
}

// Cancelar manualmente
window.cancelarAgendamento = async (id)=>{
  await deleteDoc(doc(db, "agendamentos", id));
  carregarPainel();
};
</script>

</body>
</html>
