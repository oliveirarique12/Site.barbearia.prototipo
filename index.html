<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbearia Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f5f5f5;
}

.container {
  max-width: 500px;
  margin: auto;
  background: #fff;
  min-height: 100vh;
}

.header {
  background: #111;
  color: #fff;
  padding: 20px;
}

.header h1 {
  margin: 0;
  color: #f1c40f;
}

.section {
  padding: 15px;
}

.tag, .hora, .dia {
  padding: 10px 15px;
  border-radius: 20px;
  cursor: pointer;
  margin: 5px;
  display: inline-block;
  background: #eee;
}

.tag.active, .dia.active, .hora.active {
  background: #f1c40f;
  font-weight: bold;
}

.hora.ocupado {
  background: #ccc;
  text-decoration: line-through;
  cursor: not-allowed;
}

.btn {
  display: block;
  margin-top: 15px;
  padding: 15px;
  background: #f1c40f;
  text-align: center;
  border-radius: 10px;
  text-decoration: none;
  color: #000;
  font-weight: bold;
}

.box {
  margin-top: 15px;
  padding: 10px;
  background: #eee;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>💈 Barbearia Premium</h1>
</div>

<div class="section">

<h3>✂️ Escolha o serviço</h3>

<div>
  <span class="tag" onclick="selecionarServico(this,'Corte')">Corte R$40</span>
  <span class="tag" onclick="selecionarServico(this,'Barba')">Barba R$30</span>
  <span class="tag" onclick="selecionarServico(this,'Corte + Barba')">Corte + Barba R$70</span>
</div>

<h3>📅 Escolha o dia</h3>

<div>
  <span class="dia" onclick="selecionarDia(this,'Segunda')">Seg</span>
  <span class="dia" onclick="selecionarDia(this,'Terça')">Ter</span>
  <span class="dia" onclick="selecionarDia(this,'Quarta')">Qua</span>
  <span class="dia" onclick="selecionarDia(this,'Quinta')">Qui</span>
  <span class="dia" onclick="selecionarDia(this,'Sexta')">Sex</span>
  <span class="dia" onclick="selecionarDia(this,'Sábado')">Sáb</span>
</div>

<h3>⏰ Escolha o horário</h3>

<div id="horarios"></div>

<div class="box" id="resumo">Selecione serviço, dia e horário</div>

<a id="btn" class="btn" href="#">📅 Confirmar no WhatsApp</a>

</div>

</div>

<script>
let servico = "";
let dia = "";
let hora = "";

// horários padrão
const listaHorarios = [
"09:00","09:30","10:00","10:30","11:00","11:30",
"13:00","13:30","14:00","14:30","15:00","15:30",
"16:00","16:30","17:00","17:30","18:00"
];

// horários ocupados (simulação)
let ocupados = JSON.parse(localStorage.getItem("ocupados")) || {};

// selecionar serviço
function selecionarServico(el, nome){
  document.querySelectorAll('.tag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  servico = nome;
  atualizar();
}

// selecionar dia
function selecionarDia(el, nome){
  document.querySelectorAll('.dia').forEach(d=>d.classList.remove('active'));
  el.classList.add('active');
  dia = nome;
  gerarHorarios();
  atualizar();
}

// gerar horários
function gerarHorarios(){
  const container = document.getElementById("horarios");
  container.innerHTML = "";

  listaHorarios.forEach(h => {
    const span = document.createElement("span");
    span.className = "hora";
    span.innerText = h;

    if(ocupados[dia]?.includes(h)){
      span.classList.add("ocupado");
    } else {
      span.onclick = () => selecionarHora(span, h);
    }

    container.appendChild(span);
  });
}

// selecionar hora
function selecionarHora(el, h){
  document.querySelectorAll('.hora').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  hora = h;
  atualizar();
}

// atualizar resumo
function atualizar(){
  const box = document.getElementById("resumo");
  const btn = document.getElementById("btn");

  if(servico && dia && hora){
    box.innerHTML = `${servico} - ${dia} às ${hora}`;

    const msg = `Agendamento:%0A${servico}%0A${dia} às ${hora}`;
    btn.href = `https://wa.me/5511999999999?text=${msg}`;

  } else {
    box.innerHTML = "Selecione serviço, dia e horário";
  }
}
</script>

</body>
</html>
