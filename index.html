<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mario Barba</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<meta name="theme-color" content="#3e2723">

<style>

/* BASE */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #eaeaea;
}

/* CONTAINER */
.container {
  max-width: 500px;
  margin: auto;
  background: #fff;
  min-height: 100vh;
  box-shadow: 0 0 20px rgba(0,0,0,0.2);
}

/* HEADER */
.header {
  background: linear-gradient(180deg,#000,#3e2723);
  color: #fff;
  text-align: center;
  padding: 25px;
}

.header img {
  width: 70px;
  border-radius: 50%;
}

.header h1 {
  margin-top: 10px;
  font-size: 22px;
}

/* CARD */
.card {
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
  background: #fff;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

/* SERVIÇOS */
.servicos {
  display: flex;
  gap: 10px;
  overflow-x: auto;
}

.servico {
  background: #3e2723;
  color: #fff;
  padding: 12px;
  border-radius: 15px;
  min-width: 120px;
  text-align: center;
  font-weight: bold;
  cursor: pointer;
}

.servico.active {
  background: #000;
}

/* RESUMO */
.resumo {
  background: #f5f5f5;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  margin-top: 10px;
}

/* DIAS */
.dias {
  display: flex;
  gap: 10px;
  overflow-x: auto;
}

.dia {
  background: #3e2723;
  color: #fff;
  padding: 10px;
  border-radius: 10px;
  min-width: 60px;
  text-align: center;
  cursor: pointer;
}

.dia.active {
  background: #000;
}

/* HORÁRIOS */
.horarios {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.hora {
  background: #eee;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.hora.active {
  background: #3e2723;
  color: #fff;
}

.hora.ocupado {
  background: #ccc;
  text-decoration: line-through;
  cursor: not-allowed;
}

/* BOTÃO */
.btn {
  display: block;
  margin-top: 15px;
  padding: 15px;
  background: #000;
  color: #fff;
  text-align: center;
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
}

/* DESKTOP */
@media (min-width: 900px) {

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    max-width: 900px;
    border-radius: 20px;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .header {
    grid-column: 1 / 3;
  }

}

</style>
</head>

<body>

<div class="container">

<!-- TOPO -->
<div class="header">
  <img src="https://cdn-icons-png.flaticon.com/512/921/921347.png">
  <h1>💈 Mario Barba</h1>
</div>

<!-- SERVIÇOS -->
<div class="card">
  <h3>✂️ Escolha o serviço</h3>

  <div class="servicos">
    <div class="servico" onclick="selectServico(this,'Corte')">Corte<br>R$40</div>
    <div class="servico" onclick="selectServico(this,'Barba')">Barba<br>R$30</div>
    <div class="servico" onclick="selectServico(this,'Corte + Barba')">Corte + Barba<br>R$70</div>
  </div>

  <div id="resumo" class="resumo">
    Selecione um serviço
  </div>
</div>

<!-- DIA -->
<div class="card">
  <h3>📅 Escolha o dia</h3>

  <div class="dias">
    <div class="dia" onclick="selectDia(this,'Segunda')">Seg</div>
    <div class="dia" onclick="selectDia(this,'Terça')">Ter</div>
    <div class="dia" onclick="selectDia(this,'Quarta')">Qua</div>
    <div class="dia" onclick="selectDia(this,'Quinta')">Qui</div>
    <div class="dia" onclick="selectDia(this,'Sexta')">Sex</div>
    <div class="dia" onclick="selectDia(this,'Sábado')">Sáb</div>
  </div>
</div>

<!-- HORÁRIOS -->
<div class="card">
  <h3>⏰ Horários disponíveis</h3>

  <div id="horarios" class="horarios"></div>

  <a id="btn" class="btn" href="#">📲 Confirmar no WhatsApp</a>
</div>

</div>

<script>

let servico="", dia="", hora="";

const horariosBase = [
"09:00","09:30","10:00","10:30","11:00","11:30",
"13:00","13:30","14:00","14:30","15:00","15:30",
"16:00","16:30","17:00","17:30","18:00"
];

let ocupados = {
  "Segunda": ["10:00","14:00"],
  "Sexta": ["09:30","15:00"]
};

function selectServico(el, nome){
  document.querySelectorAll('.servico').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  servico = nome;
  atualizar();
}

function selectDia(el, nome){
  document.querySelectorAll('.dia').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  dia = nome;
  gerarHorarios();
  atualizar();
}

function gerarHorarios(){
  const div = document.getElementById("horarios");
  div.innerHTML="";

  horariosBase.forEach(h=>{
    let span = document.createElement("div");
    span.className="hora";
    span.innerText=h;

    if(ocupados[dia]?.includes(h)){
      span.classList.add("ocupado");
    } else {
      span.onclick=()=>selectHora(span,h);
    }

    div.appendChild(span);
  });
}

function selectHora(el, h){
  document.querySelectorAll('.hora').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  hora=h;
  atualizar();
}

function atualizar(){
  const resumo = document.getElementById("resumo");
  const btn = document.getElementById("btn");

  if(servico) resumo.innerHTML = servico;

  if(servico && dia && hora){
    const msg = `Quero agendar: ${servico} no dia ${dia} às ${hora}`;
    btn.href = `https://wa.me/5511999999999?text=${encodeURIComponent(msg)}`;
  }
}

</script>

</body>
</html>
