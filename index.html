<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Barbearia Premium</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f5f5f5;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #fff;
      min-height: 100vh;
    }

    /* TOPO */
    .header {
      background: #111;
      color: #fff;
      padding: 20px;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 22px;
      color: #f1c40f;
    }

    .status {
      margin-top: 5px;
      font-size: 14px;
      font-weight: bold;
    }

    /* BOTÕES */
    .actions {
      padding: 15px;
    }

    .btn {
      display: block;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      text-align: center;
      background: #f1c40f;
      color: #000;
    }

    /* CARDS */
    .card {
      background: #fff;
      margin: 10px 15px;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .card h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .service {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
    }

    .price {
      font-weight: bold;
    }

    /* MAPA */
    iframe {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- TOPO -->
  <div class="header">
    <h1>💈 Barbearia Premium</h1>
    <div id="status" class="status"></div>
  </div>

  <!-- AÇÕES -->
  <div class="actions">
    <a class="btn" href="https://wa.me/5511999999999?text=Quero%20agendar%20um%20corte">
      📅 Agendar agora
    </a>

    <a class="btn" href="https://maps.app.goo.gl/GGKwxuU137peXvCf8" target="_blank">
      📍 Ver localização
    </a>
  </div>

  <!-- SERVIÇOS -->
  <div class="card">
    <h2>✂️ Serviços</h2>

    <div class="service">
      <span>Corte</span>
      <span class="price">R$40</span>
    </div>

    <div class="service">
      <span>Barba</span>
      <span class="price">R$30</span>
    </div>

    <div class="service">
      <span>Corte + Barba</span>
      <span class="price">R$70</span>
    </div>
  </div>

  <!-- PLANOS -->
  <div class="card">
    <h2>💳 Planos</h2>

    <div class="service">
      <span>Mensal Corte</span>
      <span class="price">R$80</span>
    </div>

    <div class="service">
      <span>Corte + Barba</span>
      <span class="price">R$120</span>
    </div>
  </div>

  <!-- LOCALIZAÇÃO -->
  <div class="card">
    <h2>📍 Localização</h2>

    <iframe
      src="https://www.google.com/maps?q=-23.5505,-46.6333&output=embed"
      height="200"
      loading="lazy">
    </iframe>
  </div>

</div>

<!-- SCRIPT STATUS -->
<script>
function verificarHorario() {
  const agora = new Date();
  const dia = agora.getDay();
  const hora = agora.getHours() + agora.getMinutes() / 60;

  let aberto = false;

  if (dia >= 1 && dia <= 5) {
    aberto = hora >= 9 && hora < 19;
  } else if (dia === 6) {
    aberto = hora >= 9 && hora < 16;
  }

  const status = document.getElementById("status");

  if (aberto) {
    status.innerHTML = "🟢 Aberto agora";
    status.style.color = "#2ecc71";
  } else {
    status.innerHTML = "🔴 Fechado agora";
    status.style.color = "#e74c3c";
  }
}

verificarHorario();
setInterval(verificarHorario, 60000);
</script>

</body>
</html>
