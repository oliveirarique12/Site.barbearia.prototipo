<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Barbearia Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f2f2f2;
}

.container {
  max-width: 500px;
  margin: auto;
  background: #fff;
  min-height: 100vh;
}

/* HEADER */
.header {
  background: linear-gradient(180deg,#f1c40f,#fff);
  text-align: center;
  padding: 20px;
}

.header img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
}

.header h1 {
  margin: 10px 0 0;
}

/* CARD */
.card {
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
  background: #fff;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

/* SERVIÇOS */
.servicos {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.servico {
  background: #f1c40f;
  padding: 12px;
  border-radius: 15px;
  min-width: 120px;
  text-align: center;
  font-weight: bold;
  cursor: pointer;
}

.servico.active {
  background: #000;
  color: #f1c40f;
}

/* SELECIONADO */
.resumo {
  background: #eee;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  margin-top: 10px;
}

/* DIAS */
.dias {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.dia {
  background: #f1c40f;
  padding: 10px;
  border-radius: 10px;
  min-width: 60px;
  text-align: center;
  cursor: pointer;
}

.dia.active {
  background: #000;
  color: #f1c40f;
}

/* HORÁRIOS */
.horarios {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.hora {
  background: #eee;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.hora.active {
  background: #f1c40f;
}

.hora.ocupado {
  background: #ccc;
  text-decoration: line-through;
  cursor: not-allowed;
}

/* BOTÃO */
.btn {
  display: block;
  margin-top: 15px;
  padding: 15px;
  background: #f1c40f;
  text-align: center;
  border-radius: 12px;
  text-decoration: none;
  color: #000;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<!-- TOPO -->
<div class="header">
  <img src="https://cdn-icons-png.flaticon.com/512/921/921347.png">
  <h1>Barbearia</h1>
</div>

<!-- SERVIÇOS -->
<div class="card">
  <h3>✂️ Escolha o serviço</h3>

  <div class="servicos">
    <div class="servico" onclick="selectServico(this,'Corte')">Corte<br>R$40</div>
    <div class="servico" onclick="selectServico(this,'Barba')">Barba<br>R$30</div>
    <div class="servico" onclick="selectServico(this,'Corte + Barba')">Corte + Barba<br>R$70</div>
  </div>

  <div id="resumo" class="resumo">
    Selecione um serviço
  </div>
</div>

<!-- DIA -->
<div class="card">
  <h3>📅 Qual dia deseja?</h3>

  <div class="dias">
    <div class="dia" onclick="selectDia(this,'Seg')">Seg</div>
    <div class="dia" onclick="selectDia(this,'Ter')">Ter</div>
    <div class="dia" onclick="selectDia(this,'Qua')">Qua</div>
    <div class="dia" onclick="selectDia(this,'Qui')">Qui</div>
    <div class="dia" onclick="selectDia(this,'Sex')">Sex</div>
    <div class="dia" onclick="selectDia(this,'Sáb')">Sáb</div>
  </div>
</div>

<!-- HORÁRIOS -->
<div class="card">
  <h3>⏰ Horários disponíveis</h3>

  <div id="horarios" class="horarios"></div>

  <a id="btn" class="btn" href="#">📲 Confirmar no WhatsApp</a>
</div>

</div>

<script>
let servico="", dia="", hora="";

const horariosBase = [
"09:00","09:30","10:00","10:30","11:00","11:30",
"13:00","13:30","14:00","14:30","15:00","15:30",
"16:00","16:30","17:00","17:30","18:00"
];

let ocupados = {
  "Seg": ["10:00","14:00"],
  "Sex": ["09:30","15:00"]
};

function selectServico(el, nome){
  document.querySelectorAll('.servico').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  servico = nome;
  atualizar();
}

function selectDia(el, nome){
  document.querySelectorAll('.dia').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  dia = nome;
  gerarHorarios();
  atualizar();
}

function gerarHorarios(){
  const div = document.getElementById("horarios");
  div.innerHTML="";

  horariosBase.forEach(h=>{
    let span = document.createElement("div");
    span.className="hora";
    span.innerText=h;

    if(ocupados[dia]?.includes(h)){
      span.classList.add("ocupado");
    } else {
      span.onclick=()=>selectHora(span,h);
    }

    div.appendChild(span);
  });
}

function selectHora(el, h){
  document.querySelectorAll('.hora').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  hora=h;
  atualizar();
}

function atualizar(){
  const resumo = document.getElementById("resumo");
  const btn = document.getElementById("btn");

  if(servico) resumo.innerHTML = servico;

  if(servico && dia && hora){
    const msg = `Quero agendar: ${servico} no dia ${dia} às ${hora}`;
    btn.href = `https://wa.me/5511999999999?text=${encodeURIComponent(msg)}`;
  }
}
</script>

</body>
</html><h3>⏰ Escolha o horário</h3>

<div id="horarios"></div>

<div class="box" id="resumo">Selecione serviço, dia e horário</div>

<a id="btn" class="btn" href="#">📅 Confirmar no WhatsApp</a>

</div>

</div>

<script>
let servico = "";
let dia = "";
let hora = "";

// horários padrão
const listaHorarios = [
"09:00","09:30","10:00","10:30","11:00","11:30",
"13:00","13:30","14:00","14:30","15:00","15:30",
"16:00","16:30","17:00","17:30","18:00"
];

// horários ocupados (simulação)
let ocupados = JSON.parse(localStorage.getItem("ocupados")) || {};

// selecionar serviço
function selecionarServico(el, nome){
  document.querySelectorAll('.tag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  servico = nome;
  atualizar();
}

// selecionar dia
function selecionarDia(el, nome){
  document.querySelectorAll('.dia').forEach(d=>d.classList.remove('active'));
  el.classList.add('active');
  dia = nome;
  gerarHorarios();
  atualizar();
}

// gerar horários
function gerarHorarios(){
  const container = document.getElementById("horarios");
  container.innerHTML = "";

  listaHorarios.forEach(h => {
    const span = document.createElement("span");
    span.className = "hora";
    span.innerText = h;

    if(ocupados[dia]?.includes(h)){
      span.classList.add("ocupado");
    } else {
      span.onclick = () => selecionarHora(span, h);
    }

    container.appendChild(span);
  });
}

// selecionar hora
function selecionarHora(el, h){
  document.querySelectorAll('.hora').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  hora = h;
  atualizar();
}

// atualizar resumo
function atualizar(){
  const box = document.getElementById("resumo");
  const btn = document.getElementById("btn");

  if(servico && dia && hora){
    box.innerHTML = `${servico} - ${dia} às ${hora}`;

    const msg = `Agendamento:%0A${servico}%0A${dia} às ${hora}`;
    btn.href = `https://wa.me/5511999999999?text=${msg}`;

  } else {
    box.innerHTML = "Selecione serviço, dia e horário";
  }
}
</script>

</body>
</html>
