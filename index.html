<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Barbearia Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f5f5f5;
}

.container {
  max-width: 500px;
  margin: auto;
  background: #fff;
  min-height: 100vh;
}

/* TOPO */
.header {
  background: #111;
  color: #fff;
  padding: 20px;
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
}

.header h1 {
  margin: 0;
  color: #f1c40f;
}

.status {
  font-size: 14px;
  font-weight: bold;
}

/* BOTÕES MENU */
.menu {
  padding: 15px;
}

.btn {
  display: block;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 12px;
  text-align: center;
  text-decoration: none;
  font-weight: bold;
  background: #f1c40f;
  color: #000;
  cursor: pointer;
}

/* SEÇÕES (ESCONDIDAS) */
.section {
  display: none;
  padding: 15px;
  animation: fade 0.3s ease;
}

@keyframes fade {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

/* CARD */
.card {
  background: #fff;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.service {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
}

.price {
  font-weight: bold;
}

iframe {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <!-- TOPO -->
  <div class="header">
    <h1>💈 Barbearia Premium</h1>
    <div id="status" class="status"></div>
  </div>

  <!-- MENU -->
  <div class="menu">

    <div class="btn" onclick="abrir('servicos')">✂️ Serviços</div>

    <div class="btn" onclick="abrir('planos')">💳 Planos</div>

    <a class="btn" href="https://wa.me/5511999999999?text=Quero%20agendar%20um%20corte">
      📅 Agendar agora
    </a>

    <div class="btn" onclick="abrir('localizacao')">📍 Localização</div>

  </div>

  <!-- SERVIÇOS -->
  <div id="servicos" class="section">
    <div class="card">
      <h2>✂️ Serviços</h2>

      <div class="service">
        <span>Corte</span>
        <span class="price">R$40</span>
      </div>

      <div class="service">
        <span>Barba</span>
        <span class="price">R$30</span>
      </div>

      <div class="service">
        <span>Corte + Barba</span>
        <span class="price">R$70</span>
      </div>

    </div>
  </div>

  <!-- PLANOS -->
  <div id="planos" class="section">
    <div class="card">
      <h2>💳 Planos</h2>

      <div class="service">
        <span>Corte mensal</span>
        <span class="price">R$80</span>
      </div>

      <div class="service">
        <span>Corte + barba</span>
        <span class="price">R$120</span>
      </div>

    </div>
  </div>

  <!-- LOCALIZAÇÃO -->
  <div id="localizacao" class="section">
    <div class="card">
      <h2>📍 Localização</h2>

      <a class="btn" href="https://maps.app.goo.gl/GGKwxuU137peXvCf8" target="_blank">
        🚗 Como chegar
      </a>

      <iframe
        src="https://www.google.com/maps?q=-23.5505,-46.6333&output=embed"
        height="200">
      </iframe>

    </div>
  </div>

</div>

<!-- SCRIPT -->
<script>
// abrir seção estilo app
function abrir(secao) {
  document.querySelectorAll('.section').forEach(s => {
    s.style.display = 'none';
  });

  document.getElementById(secao).style.display = 'block';

  window.scrollTo({ top: 300, behavior: 'smooth' });
}

// status aberto/fechado
function verificarHorario() {
  const agora = new Date();
  const dia = agora.getDay();
  const hora = agora.getHours() + agora.getMinutes() / 60;

  let aberto = false;

  if (dia >= 1 && dia <= 5) {
    aberto = hora >= 9 && hora < 19;
  } else if (dia === 6) {
    aberto = hora >= 9 && hora < 16;
  }

  const status = document.getElementById("status");

  if (aberto) {
    status.innerHTML = "🟢 Aberto agora";
    status.style.color = "#2ecc71";
  } else {
    status.innerHTML = "🔴 Fechado agora";
    status.style.color = "#e74c3c";
  }
}

verificarHorario();
setInterval(verificarHorario, 60000);
</script>

</body>
</html>
